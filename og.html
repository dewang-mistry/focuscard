<!DOCTYPE html>
<!--
  Renders a 1200×630 social card for Open Graph / Twitter / iMessage previews.
  This file is rendered headlessly into og.png; it is NOT linked from index.html.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>FocusCard OG card</title>
<style>
  :root {
    --tint: #4ea0ff;
    --bg: #0a0d12;
    --fg: #f6f7fa;
    --muted: rgba(246, 247, 250, 0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    background: var(--bg);
    color: var(--fg);
    font: 17px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    position: relative;
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    align-items: center;
    padding: 0 64px;
  }
  body::before {
    content: "";
    position: absolute;
    top: 25%; right: -10%;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(0, 122, 255, 0.22) 0%, transparent 60%);
    pointer-events: none;
  }
  .left { z-index: 1; }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }
  .badge {
    width: 48px; height: 48px;
    background: var(--tint);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .badge .card {
    width: 30px; height: 20px;
    background: white; border-radius: 3px;
    position: relative; overflow: hidden;
  }
  .badge .card::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--tint);
  }
  .brand h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .headline {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.04;
    letter-spacing: -0.025em;
    margin-bottom: 24px;
  }
  .headline em {
    display: block;
    font-style: italic;
    font-weight: 400;
    color: var(--muted);
  }
  .tagline {
    font-size: 18px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 520px;
    margin-bottom: 32px;
  }
  .tagline strong {
    color: rgba(246, 247, 250, 0.78);
    font-weight: 600;
  }
  .url {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.10);
    color: var(--fg);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .url::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #34c759;
    box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.18);
  }

  /* Phone mockup, slightly tilted */
  .right {
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
  }
  .phone {
    width: 270px;
    height: 540px;
    background: linear-gradient(160deg, #2a2e36 0%, #14171c 100%);
    border-radius: 42px;
    padding: 8px;
    box-shadow:
      0 50px 100px -25px rgba(0, 0, 0, 0.8),
      0 0 0 1px rgba(255, 255, 255, 0.06),
      inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    position: relative;
    transform: rotate(4deg);
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 96px; height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 3;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: #000;
    border-radius: 34px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--tint);
    z-index: 2;
  }
  .phone-text {
    color: white;
    font-size: 38px;
    font-weight: 600;
    text-align: center;
    letter-spacing: -0.015em;
    line-height: 1.12;
    padding: 0 22px;
  }
  .phone-pause {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255, 255, 255, 0.22);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="brand">
      <div class="badge"><div class="card"></div></div>
      <h1>FocusCard</h1>
    </div>
    <h2 class="headline">
      One task.
      <em>The only thing on your screen.</em>
    </h2>
    <p class="tagline">
      Built for <strong>deep work</strong>, <strong>ADHD focus</strong>, and anyone who's ever taped a sticky note to their laptop.
    </p>
    <span class="url">focuscard.app</span>
  </div>

  <div class="right">
    <div class="phone">
      <div class="phone-screen">
        <div class="phone-stripe"></div>
        <div class="phone-text">Draft article opening</div>
        <div class="phone-pause">TAP TO PAUSE</div>
      </div>
    </div>
  </div>
</body>
</html>
